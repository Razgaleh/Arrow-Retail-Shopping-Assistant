events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS — lets proxy_pass hostnames re-resolve when containers are recreated
    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP server - redirect to HTTPS (default_server + any Host: works for localhost, IP, or DNS)
    server {
        listen 80 default_server;
        server_name _;

        # Redirect all HTTP to HTTPS (using port 3443 externally)
        return 301 https://$host:3443$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2 default_server;
        server_name _;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Allow microphone for voice assistant (Web Speech API)
        add_header Permissions-Policy "microphone=(self)";

        # Frontend (variables + resolver so frontend IP updates after docker recreate)
        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Backend API — set must come before rewrite ... break (break skips later rewrite-module directives)
        location /api/ {
            set $backend_upstream http://chain-server:8009;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
